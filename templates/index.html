<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suite Vila — PMS</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; color: #1a202c; }
  header { background: #1a365d; color: white; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.5px; }
  header span { font-size: 0.85rem; opacity: 0.7; }
  .container { max-width: 1300px; margin: 0 auto; padding: 24px; }

  /* KPIs */
  .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .kpi { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .kpi label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: #718096; }
  .kpi .valor { font-size: 1.9rem; font-weight: 700; color: #1a365d; margin-top: 4px; }
  .kpi .sub { font-size: 0.78rem; color: #a0aec0; margin-top: 2px; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
  .tab { padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 0.88rem; font-weight: 500; border: none; background: #e2e8f0; color: #4a5568; transition: all .15s; }
  .tab.active { background: #1a365d; color: white; }

  /* Tabela */
  .card { background: white; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.08); overflow: hidden; }
  .card-header { padding: 16px 20px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; }
  .card-header h2 { font-size: 1rem; font-weight: 600; }
  table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
  th { background: #f7fafc; color: #4a5568; font-weight: 600; padding: 10px 14px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
  td { padding: 10px 14px; border-bottom: 1px solid #f0f4f8; }
  tr:hover td { background: #f7fafc; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 0.72rem; font-weight: 600; }
  .badge-booking { background: #bee3f8; color: #2b6cb0; }
  .badge-airbnb { background: #fed7d7; color: #c53030; }
  .badge-direta { background: #c6f6d5; color: #276749; }
  .badge-confirmada { background: #c6f6d5; color: #276749; }
  .badge-checkout { background: #e2e8f0; color: #4a5568; }
  .badge-pendente { background: #fefcbf; color: #975a16; }
  .btn { padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
  .btn-primary { background: #1a365d; color: white; }
  .btn-success { background: #276749; color: white; }
  .btn-danger { background: #c53030; color: white; font-size: 0.72rem; padding: 4px 10px; }
  .btn-sm { padding: 4px 10px; font-size: 0.75rem; }
  select, input { border: 1px solid #e2e8f0; border-radius: 6px; padding: 6px 10px; font-size: 0.875rem; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 12px; padding: 28px; width: 480px; max-width: 95vw; }
  .modal h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; color: #1a365d; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 0.78rem; font-weight: 600; color: #4a5568; margin-bottom: 4px; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; border: 1px solid #e2e8f0; border-radius: 6px; padding: 8px 10px; font-size: 0.875rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  /* Pendentes */
  .alerta { background: #fffbeb; border: 1px solid #f6e05e; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 0.85rem; display: none; }
  .alerta.show { display: block; }

  /* Relatório */
  .rel-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 1px; background: #e2e8f0; border-radius: 8px; overflow: hidden; }
  .rel-cell { background: white; padding: 12px 8px; text-align: center; font-size: 0.8rem; }
  .rel-cell.header { background: #1a365d; color: white; font-weight: 700; font-size: 0.72rem; }
  .rel-cell.mes { font-weight: 600; color: #1a365d; }
  .ano-selector { display: flex; align-items: center; gap: 8px; }
</style>
</head>
<body>
<header>
  <h1>🏠 Suite Vila — PMS</h1>
  <span id="hoje"></span>
</header>

<div class="container">
  <div id="alerta-pendentes" class="alerta"></div>

  <div class="kpis">
    <div class="kpi"><label>Diárias (ano)</label><div class="valor" id="k-diarias">—</div><div class="sub">noites ocupadas</div></div>
    <div class="kpi"><label>Faturamento (ano)</label><div class="valor" id="k-fat">—</div><div class="sub">valor bruto</div></div>
    <div class="kpi"><label>ADR médio</label><div class="valor" id="k-adr">—</div><div class="sub">por diária</div></div>
    <div class="kpi"><label>Ocupação</label><div class="valor" id="k-occ">—</div><div class="sub">do ano</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('reservas')">Reservas</button>
    <button class="tab" onclick="showTab('relatorio')">Relatório Mensal</button>
  </div>

  <!-- Reservas -->
  <div id="tab-reservas" class="card">
    <div class="card-header">
      <h2>Mapa de Reservas</h2>
      <div style="display:flex;gap:10px;align-items:center">
        <select id="filtro-ano" onchange="carregarReservas()"></select>
        <select id="filtro-canal" onchange="filtrarTabela()">
          <option value="">Todos os canais</option>
          <option>Booking</option><option>Airbnb</option><option>Direta</option><option>Bloqueio</option>
        </select>
        <button class="btn btn-success" onclick="abrirModal()">+ Nova Reserva</button>
        <button class="btn btn-primary btn-sm" onclick="rodarAgente()">🔄 Verificar iCal</button>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th>#</th><th>Hóspede</th><th>Check-in</th><th>Check-out</th>
          <th>Diárias</th><th>Valor Total</th><th>ADR</th><th>Canal</th><th>Status</th><th></th>
        </tr>
      </thead>
      <tbody id="tbody-reservas"><tr><td colspan="10" style="text-align:center;padding:30px;color:#a0aec0">Carregando...</td></tr></tbody>
    </table>
  </div>

  <!-- Relatório -->
  <div id="tab-relatorio" style="display:none">
    <div class="card">
      <div class="card-header">
        <h2>Relatório Mensal</h2>
        <div class="ano-selector">
          <select id="rel-ano" onchange="carregarRelatorio()"></select>
        </div>
      </div>
      <div style="padding:20px">
        <div class="rel-grid">
          <div class="rel-cell header">Mês</div>
          <div class="rel-cell header">Diárias</div>
          <div class="rel-cell header">Faturamento</div>
          <div class="rel-cell header">Fat. Real</div>
          <div class="rel-cell header">ADR</div>
          <div class="rel-cell header">OCC</div>
        </div>
        <div id="rel-body"></div>
      </div>
    </div>
  </div>
</div>

<!-- Modal nova reserva -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-titulo">Nova Reserva</h3>
    <div class="form-row">
      <div class="form-group"><label>Check-in</label><input type="date" id="f-checkin"></div>
      <div class="form-group"><label>Check-out</label><input type="date" id="f-checkout"></div>
    </div>
    <div class="form-group"><label>Hóspede</label><input type="text" id="f-hospede" placeholder="Nome completo"></div>
    <div class="form-row">
      <div class="form-group"><label>Valor Total (R$)</label><input type="number" id="f-valor" step="0.01" placeholder="0.00"></div>
      <div class="form-group"><label>Canal</label>
        <select id="f-canal">
          <option>Booking</option><option>Airbnb</option><option>Direta</option><option>Vrbo</option><option>Bloqueio</option><option>No Show</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label>Status</label>
      <select id="f-status">
        <option>Reserva Confirmada</option><option>Check in</option><option>Check out</option><option>Reserva sem Pag.</option><option>Reserva com Pag. Parcial</option><option>Bloqueado</option><option>No Show</option>
      </select>
    </div>
    <div class="form-group"><label>Observações</label><textarea id="f-obs" rows="2" style="resize:vertical"></textarea></div>
    <div class="modal-footer">
      <button class="btn" onclick="fecharModal()" style="background:#e2e8f0">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarReserva()">Salvar</button>
    </div>
  </div>
</div>

<script>
const MESES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
let reservasCache = [];
let editandoId = null;

document.getElementById('hoje').textContent = new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});

// Preenche selects de ano
const anoAtual = new Date().getFullYear();
[document.getElementById('filtro-ano'), document.getElementById('rel-ano')].forEach(sel => {
  for(let a = anoAtual+1; a >= 2024; a--) {
    const opt = document.createElement('option');
    opt.value = a; opt.textContent = a;
    if(a === anoAtual) opt.selected = true;
    sel.appendChild(opt);
  }
});

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-reservas').style.display = tab === 'reservas' ? '' : 'none';
  document.getElementById('tab-relatorio').style.display = tab === 'relatorio' ? '' : 'none';
  if(tab === 'relatorio') carregarRelatorio();
}

async function carregarReservas() {
  const ano = document.getElementById('filtro-ano').value;
  const res = await fetch(`/api/reservas?ano=${ano}`);
  reservasCache = await res.json();
  filtrarTabela();
  atualizarKPIs(reservasCache);
  verificarPendentes(reservasCache);
}

function filtrarTabela() {
  const canal = document.getElementById('filtro-canal').value;
  const dados = canal ? reservasCache.filter(r => r.canal === canal) : reservasCache;
  renderTabela(dados);
}

function renderTabela(dados) {
  const tbody = document.getElementById('tbody-reservas');
  if(!dados.length) {
    tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:30px;color:#a0aec0">Nenhuma reserva encontrada</td></tr>';
    return;
  }
  tbody.innerHTML = dados.map(r => `
    <tr>
      <td style="color:#a0aec0;font-size:0.75rem">${r.numero_reserva || r.uid?.slice(0,8) || '—'}</td>
      <td><strong>${r.hospede || '<em style="color:#e53e3e">Aguardando</em>'}</strong></td>
      <td>${fmt(r.check_in)}</td>
      <td>${fmt(r.check_out)}</td>
      <td style="text-align:center">${r.diarias || '—'}</td>
      <td>${r.valor_total ? 'R$ '+Number(r.valor_total).toLocaleString('pt-BR',{minimumFractionDigits:2}) : '—'}</td>
      <td>${r.adr ? 'R$ '+Number(r.adr).toFixed(2) : '—'}</td>
      <td><span class="badge badge-${r.canal?.toLowerCase()}">${r.canal}</span></td>
      <td><span class="badge ${statusClass(r.status)}">${r.status}</span></td>
      <td>
        <button class="btn btn-sm" style="background:#e2e8f0;margin-right:4px" onclick="editarReserva(${r.id})">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deletarReserva(${r.id})">✕</button>
      </td>
    </tr>
  `).join('');
}

function statusClass(s) {
  if(!s) return '';
  if(s.includes('Confirmada')) return 'badge-confirmada';
  if(s.includes('Check out') || s === 'Check out') return 'badge-checkout';
  if(s.includes('Aguardando') || s.includes('sem Pag')) return 'badge-pendente';
  return '';
}

function fmt(d) {
  if(!d) return '—';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function atualizarKPIs(dados) {
  const validos = dados.filter(r => r.status !== 'Bloqueado' && r.valor_total);
  const diarias = validos.reduce((s,r) => s + (r.diarias||0), 0);
  const fat = validos.reduce((s,r) => s + Number(r.valor_total||0), 0);
  const adr = diarias > 0 ? fat/diarias : 0;
  const diasAno = 365;
  document.getElementById('k-diarias').textContent = diarias;
  document.getElementById('k-fat').textContent = 'R$ '+fat.toLocaleString('pt-BR',{minimumFractionDigits:2});
  document.getElementById('k-adr').textContent = 'R$ '+adr.toFixed(2);
  document.getElementById('k-occ').textContent = (diarias/diasAno*100).toFixed(1)+'%';
}

function verificarPendentes(dados) {
  const pend = dados.filter(r => r.aguardando_detalhes);
  const el = document.getElementById('alerta-pendentes');
  if(pend.length) {
    el.className = 'alerta show';
    el.innerHTML = `⚠️ <strong>${pend.length} reserva(s) aguardando detalhes</strong> — responda no WhatsApp com: <code>RESERVA [id] | Nome | Valor | Obs</code>`;
  } else {
    el.className = 'alerta';
  }
}

async function carregarRelatorio() {
  const ano = document.getElementById('rel-ano').value;
  const res = await fetch(`/api/relatorios/mensal?ano=${ano}`);
  const dados = await res.json();
  const body = document.getElementById('rel-body');
  body.innerHTML = dados.map(m => `
    <div class="rel-grid">
      <div class="rel-cell mes">${MESES[m.mes-1]}</div>
      <div class="rel-cell">${m.diarias}</div>
      <div class="rel-cell">${m.faturamento ? 'R$ '+Number(m.faturamento).toLocaleString('pt-BR',{minimumFractionDigits:2}) : '—'}</div>
      <div class="rel-cell">${m.faturamento_real ? 'R$ '+Number(m.faturamento_real).toLocaleString('pt-BR',{minimumFractionDigits:2}) : '—'}</div>
      <div class="rel-cell">${m.adr ? 'R$ '+m.adr.toFixed(2) : '—'}</div>
      <div class="rel-cell">${(m.occ*100).toFixed(1)}%</div>
    </div>
  `).join('');
}

function abrirModal(dados) {
  editandoId = dados?.id || null;
  document.getElementById('modal-titulo').textContent = editandoId ? 'Editar Reserva' : 'Nova Reserva';
  document.getElementById('f-checkin').value = dados?.check_in || '';
  document.getElementById('f-checkout').value = dados?.check_out || '';
  document.getElementById('f-hospede').value = dados?.hospede || '';
  document.getElementById('f-valor').value = dados?.valor_total || '';
  document.getElementById('f-canal').value = dados?.canal || 'Booking';
  document.getElementById('f-status').value = dados?.status || 'Reserva Confirmada';
  document.getElementById('f-obs').value = dados?.observacoes || '';
  document.getElementById('modal').classList.add('open');
}

function fecharModal() { document.getElementById('modal').classList.remove('open'); }

function editarReserva(id) {
  const r = reservasCache.find(x => x.id === id);
  if(r) abrirModal(r);
}

async function salvarReserva() {
  const payload = {
    check_in: document.getElementById('f-checkin').value,
    check_out: document.getElementById('f-checkout').value,
    hospede: document.getElementById('f-hospede').value,
    valor_total: parseFloat(document.getElementById('f-valor').value) || null,
    canal: document.getElementById('f-canal').value,
    status: document.getElementById('f-status').value,
    observacoes: document.getElementById('f-obs').value,
    aguardando_detalhes: false,
  };
  if(!payload.check_in || !payload.check_out) return alert('Preencha check-in e check-out');

  const url = editandoId ? `/api/reservas/${editandoId}` : '/api/reservas';
  const method = editandoId ? 'PUT' : 'POST';
  await fetch(url, {method, headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
  fecharModal();
  carregarReservas();
}

async function deletarReserva(id) {
  if(!confirm('Confirma exclusão desta reserva?')) return;
  await fetch(`/api/reservas/${id}`, {method:'DELETE'});
  carregarReservas();
}

async function rodarAgente() {
  const btn = event.target;
  btn.textContent = '⏳ Verificando...';
  btn.disabled = true;
  try {
    const r = await fetch('/api/agent/run', {method:'POST'});
    const d = await r.json();
    alert(d.msg || 'Concluído');
    carregarReservas();
  } finally {
    btn.textContent = '🔄 Verificar iCal';
    btn.disabled = false;
  }
}

document.getElementById('modal').addEventListener('click', e => { if(e.target === e.currentTarget) fecharModal(); });

carregarReservas();
</script>
</body>
</html>
